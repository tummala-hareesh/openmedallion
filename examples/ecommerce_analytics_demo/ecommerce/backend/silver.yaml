bronze_to_silver:
  tables:
    - source_file: orders.parquet
      output_file: orders.parquet
      transforms:
        - type: cast
          columns:
            order_id:    Int64
            product_id:  Int64
            customer_id: Int64
            qty:         Int64

    - source_file: products.parquet
      output_file: products.parquet
      transforms:
        - type: cast
          columns:
            product_id: Int64
            unit_price: Float64
            unit_cost:  Float64

    - source_file: customers.parquet
      output_file: customers.parquet
      transforms:
        - type: cast
          columns:
            customer_id: Int64

  derived_tables:
    - output_file: order_lines_enriched.parquet
      udf:
        file: ecommerce/backend/udf/silver/enrich.py
        function: build_order_lines_enriched
