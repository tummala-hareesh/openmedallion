bronze_to_silver:
  tables:
    - source_file: ORDERS.parquet
      output_file: orders.parquet
      transforms:
        - type: rename
          columns:
            ORDER_ID:    order_id
            PRODUCT_ID:  product_id
            CUSTOMER_ID: customer_id
            QTY:         qty
            ORDER_DATE:  order_date
            STATUS:      status
        - type: cast
          columns:
            order_id:    Int64
            product_id:  Int64
            customer_id: Int64
            qty:         Int64

    - source_file: PRODUCTS.parquet
      output_file: products.parquet
      transforms:
        - type: rename
          columns:
            PRODUCT_ID:   product_id
            PRODUCT_NAME: product_name
            CATEGORY:     category
            UNIT_PRICE:   unit_price
            UNIT_COST:    unit_cost
        - type: cast
          columns:
            product_id: Int64
            unit_price: Float64
            unit_cost:  Float64

    - source_file: CUSTOMERS.parquet
      output_file: customers.parquet
      transforms:
        - type: rename
          columns:
            CUSTOMER_ID: customer_id
            NAME:        name
            EMAIL:       email
            REGION:      region
            TIER:        tier
        - type: cast
          columns:
            customer_id: Int64

  derived_tables:
    - output_file: order_lines_enriched.parquet
      udf:
        file: ecommerce/backend/udf/silver/enrich.py
        function: build_order_lines_enriched
