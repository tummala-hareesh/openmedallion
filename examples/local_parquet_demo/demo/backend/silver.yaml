bronze_to_silver:
  tables:
    - source_file: ORDERS.parquet
      output_file: orders.parquet
      transforms:
        - type: rename
          columns:
            ORDER_ID:      order_id
            CUSTOMER_ID:   customer_id
            CUSTOMER_NAME: customer_name
            AMOUNT:        amount
            STATUS:        status
            CREATED_AT:    created_at

        - type: cast
          columns:
            order_id:    Int64
            customer_id: Int64
            amount:      Float64

        - type: udf
          file: demo/backend/udf/silver/enrich.py
          function: flag_large_orders
          args:
            threshold: 100.0
