id: demo
namespace: openmedallion.examples
description: "Bronze → Silver → Gold pipeline for the local_parquet_demo."

tasks:

  - id: seed_bronze
    type: io.kestra.plugin.scripts.python.Commands
    warningOnStdErr: false
    commands:
      - python seed.py
    workingDirectory: /app/examples/local_parquet_demo

  - id: run_silver
    type: io.kestra.plugin.scripts.python.Commands
    warningOnStdErr: false
    commands:
      - medallion run demo --layer silver
    workingDirectory: /app/examples/local_parquet_demo
    dependsOn:
      - seed_bronze

  - id: run_gold
    type: io.kestra.plugin.scripts.python.Commands
    warningOnStdErr: false
    commands:
      - medallion run demo --layer gold
    workingDirectory: /app/examples/local_parquet_demo
    dependsOn:
      - run_silver

