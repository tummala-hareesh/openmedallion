id: retail
namespace: openmedallion.projects
description: "Bronze → Silver → Gold pipeline for retail."

tasks:

  - id: run_bronze
    type: io.kestra.plugin.scripts.python.Commands
    warningOnStdErr: false
    commands:
      - medallion run retail --layer bronze
    workingDirectory: /app/examples/incremental_sql_demo

  - id: run_silver
    type: io.kestra.plugin.scripts.python.Commands
    warningOnStdErr: false
    commands:
      - medallion run retail --layer silver
    workingDirectory: /app/examples/incremental_sql_demo
    dependsOn:
      - run_bronze

  - id: run_gold
    type: io.kestra.plugin.scripts.python.Commands
    warningOnStdErr: false
    commands:
      - medallion run retail --layer gold
    workingDirectory: /app/examples/incremental_sql_demo
    dependsOn:
      - run_silver

# Scheduled: run every day at 06:00 UTC to pick up delta rows
triggers:
  - id: daily_refresh
    type: io.kestra.plugin.core.trigger.Schedule
    cron: "0 6 * * *"
