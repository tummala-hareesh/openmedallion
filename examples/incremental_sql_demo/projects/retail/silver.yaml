bronze_to_silver:
  tables:
    - source_file: orders.parquet
      output_file: orders.parquet
      transforms:
        - type: cast
          columns:
            order_id:    Int64
            customer_id: Int64
            amount:      Float64

    - source_file: customers.parquet
      output_file: customers.parquet
      transforms:
        - type: cast
          columns:
            customer_id: Int64
